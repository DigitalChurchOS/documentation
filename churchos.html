      document.getElementById('themeButton').addEventListener('click', toggleTheme);
      document.getElementById('homeButton').addEventListener('click', navigateHome);
      
      const kernelBtn = document.getElementById('kernelButton');
      if (kernelBtn) kernelBtn.addEventListener('click', navigateKernel);

      const archBtn = document.getElementById('architectureButton');
      if (archBtn) archBtn.addEventListener('click', navigateArchitecture);
      
      document.getElementById('closeDownloadModal').addEventListener('click', closeDownloadModal);

      document.getElementById('openSidebar').addEventListener('click', () => {
        if (window.innerWidth >= 1024) {
          sidebar.classList.toggle('collapsed');
        } else {
          if (sidebar.classList.contains('-translate-x-full')) {
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
          } else {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
          }
        }
        updateSidebarIcon();
      });
      
      window.addEventListener('resize', updateSidebarIcon);
      updateSidebarIcon();
      overlay.addEventListener('click', closeMobile);
      
      const scrollContainer = document.querySelector('.content-scroll');
      if (scrollContainer) {
        scrollContainer.addEventListener('scroll', () => {
          const bgWrapper = document.getElementById('welcome-bg-wrapper');
          if (bgWrapper) {
            const scrolled = scrollContainer.scrollTop;
            bgWrapper.style.transform = 'translateY(' + (-scrolled * 0.4) + 'px)';
          }
        });
      }

      const searchInput = document.getElementById('searchInput');
      const clearSearch = document.getElementById('clearSearch');

      if (searchInput && clearSearch) {
        searchInput.addEventListener('input', event => {
          const val = event.target.value;
          if (val) {
            clearSearch.classList.remove('hidden');
          } else {
            clearSearch.classList.add('hidden');
          }
          renderSidebar(val.toLowerCase());
        });

        clearSearch.addEventListener('click', () => {
          searchInput.value = '';
          clearSearch.classList.add('hidden');
          renderSidebar('');
          createIcons(); // recreate x icon or keep it clean
          searchInput.focus();
        });
      }

      document.addEventListener('click', event => {
        const menu = document.getElementById('downloadMenu');
        if (!menu) return;
        const clickedDownloadButton = event.target.closest('#downloadButton');
        const clickedInsideMenu = event.target.closest('#downloadMenu');
        if (!clickedDownloadButton && !clickedInsideMenu) menu.classList.add('hidden');
      });

      app.addEventListener('click', event => {
        const sectionButton = event.target.closest('.section-open');
        if (sectionButton) navigateSection(sectionButton.getAttribute('data-section'));

        const backHomeButton = event.target.closest('.back-to-home');
        if (backHomeButton) navigateHome();

        const moduleButton = event.target.closest('.module-open');
        if (moduleButton) navigateModule(moduleButton.getAttribute('data-module'));

        const moduleMdButton = event.target.closest('.module-md');
        if (moduleMdButton) downloadModuleMarkdown(moduleMdButton.getAttribute('data-module-md'));

        const sectionMdButton = event.target.closest('.section-md');
        if (sectionMdButton) {
          const sect = sectionsData.find(item => item.id === sectionMdButton.getAttribute('data-section-md'));
          if (sect) downloadTextFile(slug(sect.title) + '.md', buildSectionMarkdown(sect));
        }

        const downloadButton = event.target.closest('.download-open');
        if (downloadButton) openDownloadModal(downloadButton.getAttribute('data-format'));

        const apiButton = event.target.closest('.mock-api');
        if (apiButton) runMockRequest(apiButton.getAttribute('data-resource'));

        const wfButton = event.target.closest('.workflow-btn');
        if (wfButton) {
          state.selectedWorkflow = parseInt(wfButton.getAttribute('data-wf'), 10);
          renderArchitecture();
        }

        const moduleNavLink = event.target.closest('.module-nav-link');
        if (moduleNavLink) navigateModule(moduleNavLink.getAttribute('data-module-nav'));
      });
    }

    function runSelfTests() {
      console.assert(typeof toggleTheme === 'function', 'toggleTheme should be globally available');
      console.assert(sectionsData.length === 9, 'There should be 9 main sections');
      console.assert(findModule('worship-experience-module').module === 'Worship Experience Module', 'Worship module should be findable');
      console.assert(buildModuleMarkdown('Worship Experience Module', sectionsData[1]).includes('Acceptance Criteria'), 'Module markdown should include acceptance criteria');
      console.assert(slug('Content Management Module') === 'content-management-module', 'Slug generation should remove symbols correctly');
      console.assert(buildSectionMarkdown(sectionsData[0]).includes('Content Management Module'), 'Section markdown should include module details');
      console.assert(buildFullMarkdown().includes('Digital Church OS Documentation'), 'Full markdown should include document title');
      console.assert(systemFlow('Test Module').includes('tenant_id'), 'System flow should mention tenant isolation');
      console.assert(document.getElementById('themeButton') !== null, 'Theme button should exist');
      console.assert(moduleIntegrations['Content Management Module'].apis.includes('Page API'), 'CMS Module should require Page API');
      console.assert(typeof renderArchitecture === 'function', 'renderArchitecture should be defined');
      console.assert(workflowsData.length === 6, 'There should be 6 core cross-module workflows');
      console.assert(moduleFeatures['Content Management Module'].includes('Website page builder'), 'CMS features should include Website page builder');
      console.assert(moduleAdaptations['Content Management Module'].includes('Can serve small churches with simple websites'), 'CMS adaptations should include small church support');
      
      // Assertions for Cell / Fellowship Module
      console.assert(sectionsData[4].modules.includes('Cell / Fellowship Module'), 'Cell / Fellowship Module should be registered under Discipleship section');
      console.assert(moduleDescriptions['Cell / Fellowship Module'] !== undefined, 'Cell / Fellowship Module description should be defined');
      console.assert(moduleFeatures['Cell / Fellowship Module'].includes('LMS Cell Ministry Leadership Course completion validation gate'), 'LMS course check feature must exist');
      console.assert(moduleFeatures['Cell / Fellowship Module'].includes('Secure Member-Only Cell Notice Board interface'), 'Notice Board feature must exist');
      console.assert(moduleAdaptations['Cell / Fellowship Module'].includes('Can configure custom auto-naming rules (numbered or descriptive) per tenant'), 'Adaptations must be defined');
      console.assert(moduleIntegrations['Cell / Fellowship Module'].apis.includes('Leadership Promotion API'), 'APIs should include Leadership Promotion API');
      console.assert(systemFlow('Cell / Fellowship Module').includes('Cell Ministry Leadership Course'), 'System flow must detail LMS qualification steps');
      console.assert(useCases('Cell / Fellowship Module').includes('Pioneering and Promoting a Cell Leader'), 'Use cases must detail leadership promotions');
      console.assert(dataModel('Cell / Fellowship Module').includes('group_notice_posts'), 'Data model must contain group_notice_posts schema');

      // Assertions for Prayer & Testimony Module
      console.assert(sectionsData[3].modules.includes('Prayer & Testimony Module'), 'Prayer & Testimony Module should be registered under Engagement section');
      console.assert(moduleDescriptions['Prayer & Testimony Module'] !== undefined, 'Prayer & Testimony Module description should be defined');
      console.assert(moduleFeatures['Prayer & Testimony Module'].includes('Corporate prayer sessions: Allows churches to create organized prayer gatherings that members can join from the website or mobile app.'), 'Corporate prayer sessions feature must exist');
      console.assert(moduleAdaptations['Prayer & Testimony Module'].includes('Can serve as a simple prayer request and testimony wall for small churches'), 'SaaS adaptations must be defined');
      console.assert(moduleIntegrations['Prayer & Testimony Module'].apis.includes('Prayer Session API'), 'APIs should include Prayer Session API');
      console.assert(systemFlow('Prayer & Testimony Module').includes('“I Prayed” confirmation button'), 'System flow must detail "I Prayed" button usage');
      console.assert(dataModel('Prayer & Testimony Module').includes('prayer_testimony_module_settings'), 'Data model must contain prayer_testimony_module_settings schema');

      // Assertions for Centralized Settings Engine Module
      console.assert(sectionsData[0].modules.includes('Centralized Settings Engine Module'), 'Centralized Settings Engine Module should be registered under Core section');
      console.assert(moduleDescriptions['Centralized Settings Engine Module'] !== undefined, 'Centralized Settings Engine Module description should be defined');
      console.assert(moduleFeatures['Centralized Settings Engine Module'].includes('Module settings schema registry: A dynamic registration layer that compiles config schemas from all modules.'), 'Schema registry feature must exist');
      console.assert(moduleAdaptations['Centralized Settings Engine Module'].includes('Can dynamically load and render settings configurations for newly installed plugins.'), 'Adaptations must be defined');
      console.assert(moduleIntegrations['Centralized Settings Engine Module'].apis.includes('Dynamic Settings Schema API'), 'APIs should include Dynamic Settings Schema API');
    }

    bindStaticEvents();
    runSelfTests();
    renderHome();
  </script>
</body>
</html>
