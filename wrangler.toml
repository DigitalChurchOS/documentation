name = "thechurch"
main = "src/worker.ts"
compatibility_date = "2026-05-28"
compatibility_flags = [
  "nodejs_compat"
]

[assets]
directory = "./dist/public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "churchos-prod-db"
database_id = "your-d1-database-uuid"
