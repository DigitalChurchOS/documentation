<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChurchOS Portal</title>
    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Service Worker Manifest -->
    <link rel="manifest" href="/manifest.json" id="pwa-manifest" />
    <meta name="theme-color" content="#f97316" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service worker registration for offline PWA functionality
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          const candidates = ['/sw.js', '/church/sw.js'];
          for (const swUrl of candidates) {
            try {
              const response = await fetch(swUrl, { method: 'HEAD' });
              if (!response.ok) continue;
              const reg = await navigator.serviceWorker.register(swUrl);
              console.log('Service Worker registered successfully:', reg.scope);
              break;
            } catch {
              // Keep trying known deployment paths.
            }
          }
        });
      }
    </script>
  </body>
</html>
