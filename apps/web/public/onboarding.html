<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Churchtell — Guided Onboarding Wizard</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <style>
    /* Modern Custom Dropdown */
    .modern-select-wrapper {
      position: relative;
      width: 100%;
      font-family: inherit;
      user-select: none;
    }
    .modern-select-trigger {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      cursor: pointer;
      color: var(--charcoal);
      font-weight: 500;
      transition: all 0.2s;
      height: 48px;
      font-size: 14px;
    }
    .modern-select-wrapper.open .modern-select-trigger {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .modern-select-trigger i {
      color: var(--charcoal);
      transition: transform 0.2s;
      width: 16px; height: 16px;
    }
    .modern-select-wrapper.open .modern-select-trigger i {
      transform: rotate(180deg);
      color: var(--accent);
    }
    .modern-select-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      z-index: 100;
      overflow: hidden;
      display: none;
      padding: 6px;
    }
    .modern-select-wrapper.open .modern-select-dropdown {
      display: block;
    }
    .modern-select-search {
      padding: 6px;
      position: relative;
    }
    .modern-select-search i,
    .modern-select-search svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }
    .modern-select-search input {
      width: 100%;
      padding: 10px 10px 10px 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg-2);
      font: inherit;
      outline: none;
      font-size: 14px;
      color: var(--charcoal);
    }
    .modern-select-search input:focus {
      border-color: var(--accent);
    }
    .modern-select-options-container {
      max-height: 250px;
      overflow-y: auto;
    }
    .modern-option {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--charcoal);
      transition: background 0.2s;
      font-weight: 500;
      font-size: 14px;
    }
    .modern-option:hover {
      background: var(--soft);
    }
    .modern-option.selected {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }
    .modern-option.selected::after {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* Modern Phone Input Group */
    .phone-input-group {
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg-2);
      overflow: visible; /* To allow dropdown to break out */
      height: 48px;
      transition: all 0.2s;
    }
    .phone-input-group:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .phone-input-group .modern-select-wrapper {
      width: 100px;
      height: 100%;
    }
    .phone-input-group .modern-select-trigger {
      border: none;
      border-right: 1px solid var(--line);
      border-radius: 12px 0 0 12px;
      background: transparent;
      height: 100%;
      padding: 0 12px;
    }
    .phone-input-group .modern-select-wrapper.open .modern-select-trigger {
      box-shadow: none;
      border-color: transparent;
      border-right: 1px solid var(--line);
    }
    .phone-input-group .modern-select-dropdown {
      width: 200px; /* Wider than trigger */
      top: calc(100% + 4px);
    }
    .phone-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0 16px;
      height: 100%;
      outline: none;
      color: var(--charcoal);
      font-family: inherit;
      font-size: 14px;
    }

    /* Modern Time Input */
    .modern-time-input {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 16px;
      font-family: inherit;
      font-size: 14px;
      color: var(--charcoal);
      outline: none;
      transition: all 0.2s;
      height: 48px;
    }
    .modern-time-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* Delete Button */
    .btn-icon-delete {
      background: none;
      border: none;
      color: #ef4444; /* Red */
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      height: 48px;
      width: 48px;
    }
    .btn-icon-delete:hover {
      background: #fee2e2;
    }
    .btn-icon-delete i {
      width: 20px; height: 20px;
    }

    /* Tooltips */
    .tooltip-container {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      cursor: pointer;
      color: var(--muted);
    }
    .tooltip-container i {
      width: 16px; height: 16px;
    }
    .tooltip-content {
      visibility: hidden;
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f2937;
      color: #fff;
      text-align: center;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      width: max-content;
      max-width: 250px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      font-weight: normal;
      line-height: 1.4;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .tooltip-container:hover .tooltip-content {
      visibility: visible;
      opacity: 1;
    }
    .tooltip-content::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: #1f2937 transparent transparent transparent;
    }

    :root {
      --bg: #f8f4ed;
      --bg-2: #fffaf3;
      --ink: #15171a;
      --muted: #73706b;
      --soft: rgba(255,255,255,.72);
      --solid: #ffffff;
      --line: rgba(21,23,26,.1);
      --accent: #f97316;
      --accent-2: #ffc27a;
      --accent-soft: rgba(249,115,22,.12);
      --charcoal: #1d1d1c;
      --shadow: 0 30px 90px rgba(61, 44, 21, .12);
      --shadow-soft: 0 18px 44px rgba(61, 44, 21, .08);
      --radius: 34px;
      --radius-sm: 22px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="dark"] {
      --bg: #151413;
      --bg-2: #1d1b19;
      --ink: #f7f0e8;
      --muted: #aaa29a;
      --soft: rgba(37,36,34,.68);
      --solid: #22201e;
      --line: rgba(255,255,255,.1);
      --accent-soft: rgba(249,115,22,.18);
      --shadow: 0 30px 100px rgba(0,0,0,.35);
      --shadow-soft: 0 18px 50px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100vh;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at 15% 10%, var(--accent-soft), transparent 28%),
        radial-gradient(circle at 92% 4%, rgba(91, 33, 182, .12), transparent 24%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: .18;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at top, black 0%, transparent 85%);
    }

    .nav {
      height: 72px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--solid) 65%, transparent);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: clamp(16px, 4vw, 40px);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-weight: 950;
      letter-spacing: -.04em;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn, .icon-btn {
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .btn {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      background: var(--soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      color: var(--ink);
      background: var(--soft);
      border: 1px solid var(--line);
    }

    .btn:hover, .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: 0;
      box-shadow: 0 14px 28px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    /* Onboarding Layout Container */
    .onboarding-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 12px 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100vh;
      width: 100%;
      box-sizing: border-box;
    }



    /* Floating Card */
    .wizard-card {
      width: 100%;
      padding: clamp(20px, 4vw, 36px);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--solid) 75%, transparent);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: opacity .3s ease, transform .3s ease;
      flex: 1;
      min-height: 0;
    }

    .wizard-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    .wizard-header h2 {
      font-size: 26px;
      letter-spacing: -.04em;
      margin: 0;
    }

    .wizard-header p {
      color: var(--muted);
      line-height: 1.5;
      margin: 0;
      font-size: 14px;
    }

    /* 2-Column Wizard Layout */
    .wizard-columns {
      display: grid;
      grid-template-columns: 1fr 2.5fr;
      gap: 28px;
      flex: 1;
      min-height: 0;
    }

    /* Left Side: Minimised Steps Progress */
    .wizard-subnav {
      border-right: 1px solid var(--line);
      padding-right: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    .substep-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
      border: 1px solid transparent;
    }

    .substep-item:hover {
      background: var(--accent-soft);
      color: var(--ink);
    }

    .substep-item.active {
      background: var(--solid);
      border-color: var(--line);
      color: var(--ink);
      box-shadow: var(--shadow-soft);
    }

    .substep-item.completed {
      color: #16a34a;
    }

    .substep-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      background: var(--bg);
      flex-shrink: 0;
    }

    .substep-item.active .substep-dot {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border-color: transparent;
    }

    .substep-item.completed .substep-dot {
      background: rgba(22, 163, 74, 0.1);
      color: #16a34a;
      border-color: rgba(22, 163, 74, 0.2);
    }

    /* Right Side: Form and Footer */
    .wizard-form-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100%;
      min-height: 0;
    }

    .wizard-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 20px;
    }

    /* Forms */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Dynamic flex height & custom modern scrollbar for step wizard form content */
    #stepForm {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 8px;
      align-content: start;
    }

    #stepForm::-webkit-scrollbar,
    #invitesListContainer::-webkit-scrollbar,
    .review-grid::-webkit-scrollbar {
      width: 6px;
    }

    #stepForm::-webkit-scrollbar-track,
    #invitesListContainer::-webkit-scrollbar-track,
    .review-grid::-webkit-scrollbar-track {
      background: transparent;
    }

    #stepForm::-webkit-scrollbar-thumb,
    #invitesListContainer::-webkit-scrollbar-thumb,
    .review-grid::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 99px;
    }

    #stepForm::-webkit-scrollbar-thumb:hover,
    #invitesListContainer::-webkit-scrollbar-thumb:hover,
    .review-grid::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 16px;
      font-family: inherit;
      font-size: 14px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      transition: all 0.2s;
      height: 48px;
    }

    textarea {
      height: 110px;
      padding: 14px 16px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      background: var(--bg-2);
    }

    /* Modules list */
    .module-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      margin-bottom: 12px;
      background: var(--solid);
      transition: all 0.2s;
    }

    .module-item.active {
      border-color: var(--accent-2);
      background: var(--bg-2);
    }

    .module-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .module-info i {
      width: 24px;
      height: 24px;
    }

    .module-info-text h4 {
      margin: 0 0 4px 0;
      font-size: 14px;
      font-weight: 800;
    }

    .module-info-text p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }

    .module-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
    }

    .module-badge.locked {
      background: rgba(21, 23, 26, 0.08);
      color: var(--muted);
    }

    /* Selectable Payment Provider Cards */
    .payment-provider-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: var(--solid);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      min-height: 100px;
      position: relative;
    }
    .payment-provider-card:hover {
      border-color: var(--accent-2);
      transform: translateY(-2px);
    }
    .payment-provider-card.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: var(--shadow-soft);
    }
    .payment-provider-card i {
      width: 28px;
      height: 28px;
      color: var(--muted);
      transition: color 0.2s;
    }
    .payment-provider-card.active i {
      color: var(--accent);
    }
    .payment-provider-card h4 {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink);
    }
    .payment-provider-card .check-indicator {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    .payment-provider-card.active .check-indicator {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Custom Checkbox Toggle */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--line);
      transition: .3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--accent);
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    /* Domain Setup */
    .domain-preview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: 12px;
      border: 1px solid var(--line);
      font-size: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
    }

    /* Upload Zone */
    .upload-zone {
      border: 2px dashed var(--line);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-2);
      transition: all 0.25s ease;
      cursor: pointer;
      min-height: 150px;
      text-align: center;
    }
    .upload-zone:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--ink);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 800;
      z-index: 999;
      opacity: 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .toast-container.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Review Dashboard Grid */
    .review-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px 16px 16px 16px;
      margin: -8px -16px -16px -16px;
    }

    /* Top-Right Category Progress Steps */
    .category-progress-steps {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-left: auto;
      flex-shrink: 0;
    }
    .progress-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 85px;
      position: relative;
      cursor: pointer;
      text-align: center;
    }
    .step-circle {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      transition: all 0.3s ease;
    }
    .step-label {
      font-size: 10px;
      margin-top: 6px;
      white-space: nowrap;
      transition: all 0.3s ease;
    }
    .step-line {
      width: 30px;
      height: 2px;
      margin-top: 12px;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .invite-inputs-row {
      display: grid;
      grid-template-columns: 2.2fr 1.8fr auto;
      gap: 12px;
      align-items: flex-end;
      width: 100%;
    }
    @media (max-width: 600px) {
      .invite-inputs-row {

  <script>
    const body = document.body;
    const progressLabel = document.getElementById("progressLabel");

    const wizardCard = document.getElementById("wizardCard");

    const PLATFORM_MODULES = [
      { key: 'website-cms', name: 'CMS & Pages', category: 'Core', icon: 'globe', description: 'Core website builder, pages, and template settings', alwaysActive: true },
      { key: 'blog', name: 'Blog', category: 'Core', icon: 'book-open', description: 'Articles, announcements, news, and publishing engine', alwaysActive: true },

    // Dynamic Dropdown Generators
    function generateCountryOptions(selectedValue, targetInputId = 'profileCountry') {
      if (!window.WORLD_COUNTRIES) return '';
      return window.WORLD_COUNTRIES.map(c => `
        <div class="modern-option ${c.name === selectedValue ? 'selected' : ''}" 
             onclick="selectOption(event, this, '${targetInputId}', '${c.name.replace(/'/g, "\\'")}', '${c.emoji} ${c.name.replace(/'/g, "\\'")}')">
          <span style="display:flex; align-items:center; gap:8px;">${c.emoji} ${c.name}</span>
        </div>
      `).join('');
    }

    function generatePhoneCodeOptions(selectedValue) {
      if (!window.WORLD_COUNTRIES) return '';
      return window.WORLD_COUNTRIES.map(c => `
        <div class="modern-option ${c.dialCode === selectedValue ? 'selected' : ''}" 
             onclick="selectOption(event, this, 'profilePhoneCode', '${c.dialCode}', '<span style=\\'font-size:12px; color:var(--muted); text-transform:uppercase;\\'>${c.code.toLowerCase()}</span> ${c.dialCode}')">
          <span style="display:flex; align-items:center; gap:8px;">
            ${c.emoji} ${c.name} (${c.dialCode})
          </span>
        </div>
      `).join('');
    }

    function generateTimezoneOptions(selectedValue) {
      const timezones = Intl.supportedValuesOf ? Intl.supportedValuesOf('timeZone') : ['UTC', 'America/Edmonton', 'Africa/Nairobi', 'Europe/London'];
      
      const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Edmonton';
      
      let optionsHtml = `
        <div class="modern-option ${selectedValue === 'local' || selectedValue === localTz ? 'selected' : ''}" 
             onclick="selectOption(event, this, 'profileTimezone', '${localTz}', 'Local (Auto-detected: ${localTz})')">
          <span style="display:flex; align-items:center; gap:8px;">
            <strong>Local Timezone</strong> <span style="font-size:11px; color:var(--muted);">(${localTz})</span>
          </span>
        </div>
      `;
      
      optionsHtml += timezones.map(tz => `
        <div class="modern-option ${tz === selectedValue ? 'selected' : ''}" 
             onclick="selectOption(event, this, 'profileTimezone', '${tz}', '${tz}')">
          ${tz}
        </div>
      `).join('');
      
      return optionsHtml;
    }

    function filterOptions(inputEl) {
      const filter = inputEl.value.toLowerCase();
      const optionsContainer = inputEl.closest('.modern-select-dropdown').querySelector('.modern-select-options-container');
      const options = optionsContainer.querySelectorAll('.modern-option');
      options.forEach(opt => {
        const text = opt.textContent.toLowerCase();
        opt.style.display = text.includes(filter) ? 'flex' : 'none';
      });
    }

    function onToggleDefaultPaymentChange(chk) {
      const nativeCard = document.getElementById('nativeCheckoutCard');
      const customGrid = document.getElementById('customGatewaysGrid');
      const customLabel = document.getElementById('customGatewaysLabel');
      const customDesc = document.getElementById('customGatewaysDesc');
      const gatewayInput = document.getElementById('gatewayProvider');
      
      if (!nativeCard || !customGrid || !gatewayInput) return;
      
      if (!chk.checked) {
        // Platform Checkout active (Default)
        gatewayInput.value = 'native';
        
        // Style native card
        nativeCard.classList.add('active');
        nativeCard.style.opacity = '1';
        nativeCard.style.filter = 'none';
        nativeCard.style.pointerEvents = 'none';
        const nativeIndicator = nativeCard.querySelector('.check-indicator');
        if (nativeIndicator) {
          nativeIndicator.innerHTML = '<i data-lucide="check" style="width:10px; height:10px; color:white;"></i>';
        }
        lucide.createIcons({ root: nativeCard });
        
        // Gray out custom grid
        customGrid.style.opacity = '0.4';
        customGrid.style.filter = 'grayscale(100%)';
        customGrid.style.pointerEvents = 'none';
        if (customLabel) {
          customLabel.style.color = 'var(--muted)';
        }
        if (customDesc) {
          customDesc.style.opacity = '0.6';
        }
        
        // Deselect all custom cards
        const customCards = customGrid.querySelectorAll('.payment-provider-card');
        customCards.forEach(c => {
          c.classList.remove('active');
          const indicator = c.querySelector('.check-indicator');
          if (indicator) {
            indicator.innerHTML = '';
          }
        });
      } else {
        // Custom gateways active
        nativeCard.classList.remove('active');
        nativeCard.style.opacity = '0.4';
        nativeCard.style.filter = 'grayscale(100%)';
        nativeCard.style.pointerEvents = 'none';
        const nativeIndicator = nativeCard.querySelector('.check-indicator');
        if (nativeIndicator) {
          nativeIndicator.innerHTML = '';
        }
        
        // Enable custom grid
        customGrid.style.opacity = '1';
        customGrid.style.filter = 'none';
        customGrid.style.pointerEvents = 'auto';
        if (customLabel) {
          customLabel.style.color = 'var(--ink)';
        }
        if (customDesc) {
          customDesc.style.opacity = '1';
        }
        
        // Auto-select a fallback if no custom options are selected
        const customCards = customGrid.querySelectorAll('.payment-provider-card');
        const activeCustom = Array.from(customCards).filter(c => c.classList.contains('active'));
        if (activeCustom.length === 0) {
          const pesapalCard = customGrid.querySelector('[data-gateway="pesapal"]');
          if (pesapalCard) {
            pesapalCard.classList.add('active');
            const indicator = pesapalCard.querySelector('.check-indicator');
            if (indicator) {
              indicator.innerHTML = '<i data-lucide="check" style="width:10px; height:10px; color:white;"></i>';
            }
            lucide.createIcons({ root: pesapalCard });
          }
        }
        
        // Update input value
        const updatedActiveCards = customGrid.querySelectorAll('.payment-provider-card.active');
        const updatedKeys = Array.from(updatedActiveCards).map(card => card.dataset.gateway);
        gatewayInput.value = updatedKeys.join(',');
      }
    }

    function toggleGatewayCard(el) {
      if (el.style.pointerEvents === 'none' || el.closest('#customGatewaysGrid')?.style.pointerEvents === 'none') {
        return;
      }
      
      el.classList.toggle('active');
      
      const customGrid = document.getElementById('customGatewaysGrid');
      const activeCustomCards = customGrid ? customGrid.querySelectorAll('.payment-provider-card.active') : [];
      const activeKeys = Array.from(activeCustomCards).map(card => card.dataset.gateway);
      
      const gatewayInput = document.getElementById('gatewayProvider');
      if (gatewayInput) {
        gatewayInput.value = activeKeys.join(',');
      }
      
      const indicator = el.querySelector('.check-indicator');
      if (indicator) {
        if (el.classList.contains('active')) {
          indicator.innerHTML = '<i data-lucide="check" style="width:10px; height:10px; color:white;"></i>';
        } else {
          indicator.innerHTML = '';
        }
      }
      
      lucide.createIcons({ root: el });
    }

    // Secure authentication check
    const token = localStorage.getItem("churchos.token");
    const tenantId = localStorage.getItem("churchos.tenantId");
    const ONBOARDING_CONTEXT_KEY = "churchos.onboardingContext.v1";

    if (!token || !tenantId) {
      window.location.href = "/start";
    }



    // Theme Icon toggle
    function icon(name) {
      return `<i data-lucide="${name}"></i>`;
    }

    function toggleDropdown(el) {
      const dropdown = el.querySelector('.modern-select-dropdown');
      const trigger = el.querySelector('.modern-select-trigger');

      document.querySelectorAll('.modern-select-wrapper.open').forEach(openWrapper => {
        if (openWrapper !== el) {
          closeDropdown(openWrapper);
        }
      });

      const isOpen = el.classList.toggle('open');
      if (isOpen && dropdown && trigger) {
        // Remember original wrapper on the dropdown so we know where to return it
        dropdown.dataset.originalWrapperId = el.id || '';
        if (!el.id) {
          el.id = 'select-wrapper-' + Math.random().toString(36).substr(2, 9);
          dropdown.dataset.originalWrapperId = el.id;
        }

        const rect = trigger.getBoundingClientRect();
        
        // Append to body so it escapes containing blocks (e.g. backdrop-filter)
        document.body.appendChild(dropdown);

        dropdown.style.display = 'block';
        dropdown.style.position = 'fixed';
        dropdown.style.left = rect.left + 'px';
        dropdown.style.right = 'auto'; // override CSS right:0 rule to prevent shifting/stretching
        dropdown.style.zIndex = '99999';
        if (el.closest('.phone-input-group')) {
          dropdown.style.width = '240px';
        } else {
          dropdown.style.width = rect.width + 'px';
        }

        // Adjust drop direction based on available space in viewport
        const spaceBelow = window.innerHeight - rect.bottom;
        const spaceAbove = rect.top;
        const estimatedHeight = 300; // max estimated height of dropdown panel

        if (spaceBelow < estimatedHeight && spaceAbove > spaceBelow) {
          // Drop UP
          dropdown.style.top = 'auto';
          dropdown.style.bottom = (window.innerHeight - rect.top + 6) + 'px';
        } else {
          // Drop DOWN
          dropdown.style.bottom = 'auto';
          dropdown.style.top = (rect.bottom + 6) + 'px';
        }
      } else if (!isOpen && dropdown) {
        closeDropdown(el);
      }
      lucide.createIcons();
    }

    function closeDropdown(wrapper) {
      wrapper.classList.remove('open');
      const dropdown = document.querySelector(`.modern-select-dropdown[data-original-wrapper-id="${wrapper.id}"]`);
      if (dropdown) {
        // Append it back to its original parent wrapper
        wrapper.appendChild(dropdown);
        dropdown.style.display = '';
        dropdown.style.position = '';
        dropdown.style.top = '';
        dropdown.style.bottom = '';
        dropdown.style.left = '';
        dropdown.style.right = '';
        dropdown.style.width = '';
        dropdown.style.zIndex = '';
        delete dropdown.dataset.originalWrapperId;
      }
    }

    function selectOption(event, el, inputId, value, textHtml) {
      event.stopPropagation();
      const dropdown = el.closest('.modern-select-dropdown');
      const wrapperId = dropdown?.dataset.originalWrapperId;
      const customSelect = wrapperId ? document.getElementById(wrapperId) : el.closest('.modern-select-wrapper');
      
      // update hidden input
      const inputEl = document.getElementById(inputId);
      if (inputEl) {
        inputEl.value = value;
      }
      
      // update selected text HTML
      if (customSelect) {
        const triggerSpan = customSelect.querySelector('.modern-select-trigger span');
        if (triggerSpan) {
          triggerSpan.innerHTML = textHtml;
        }
      }
      
      // update selected class
      if (dropdown) {
        dropdown.querySelectorAll('.modern-option').forEach(item => item.classList.remove('selected'));
      }
      el.classList.add('selected');
      
      // close dropdown
      if (customSelect) {
        closeDropdown(customSelect);
      }
      lucide.createIcons();
      
      // Trigger change event if needed
      if (inputEl) {
        const evt = new Event('change');
        inputEl.dispatchEvent(evt);
      }
    }

    // Close dropdowns when clicking outside
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.modern-select-wrapper') && !e.target.closest('.modern-select-dropdown')) {
        document.querySelectorAll('.modern-select-wrapper.open').forEach(wrapper => {
          closeDropdown(wrapper);
        });
        lucide.createIcons();
      }
    });

    function addServiceTimeRow() {
      const container = document.getElementById('serviceTimesContainer');

      const stCounter = Date.now();

      });

      div.innerHTML = `
        <input type="hidden" class="st-day-val" id="st-day-${stCounter}" value="Sunday" />
        <div class="modern-select-wrapper" style="flex:1;" onclick="toggleDropdown(this)">
          <div class="modern-select-trigger"><span>Sunday</span> <i data-lucide="chevron-down"></i></div>
          <div class="modern-select-dropdown">
            ${optionsHtml}
          </div>
        </div>

        <button type="button" class="btn-icon-delete" onclick="this.parentElement.remove()" title="Delete Service Time">
          <i data-lucide="trash-2"></i>
        </button>
      `;
      container.appendChild(div);
      lucide.createIcons({ root: div });
    }    // Theme Icon toggle

      return `<i data-lucide="${name}"></i>`;
    }

    // Category navigation tabs definitions
    const categoriesDef = [
      { index: 0, title: 'Identity & Core', description: 'Define your church identity, location, and schedules' },
      { index: 1, title: 'Branding & Web', description: 'Configure website branding, logos, and custom domains' },
      { index: 2, title: 'Features & Team', description: 'Select modules and invite team members' },

    // Wizard sub-steps definitions

      // Category 0
      { index: 0, category: 0, stepKey: 'profile', subStepKey: 'profile-basic', title: 'Basic Profile', description: 'Setup church basic identity details' },

      { index: 2, category: 0, stepKey: 'profile', subStepKey: 'profile-times', title: 'Service Times', description: 'Configure worship services schedules and timezone' },
      // Category 1
      { index: 3, category: 1, stepKey: 'logo', subStepKey: 'logo', title: 'Brand Logo', description: 'Upload logos and favicon' },
      { index: 4, category: 1, stepKey: 'website', subStepKey: 'website', title: 'Website Info', description: 'Configure landing page content' },
      { index: 5, category: 1, stepKey: 'domain', subStepKey: 'domain', title: 'Domain Setup', description: 'Reserve subdomain and custom domain' },
      // Category 2
      { index: 6, category: 2, stepKey: 'modules', subStepKey: 'modules', title: 'Active Modules', description: 'Enable target ministry modules' },
      { index: 7, category: 2, stepKey: 'giving', subStepKey: 'giving', title: 'Giving Settings', description: 'Setup payment gateway provider' },
      { index: 8, category: 2, stepKey: 'invite', subStepKey: 'invite', title: 'Invite Team', description: 'Invite staff members to the workspace' }
    ];

    let state = {
      activeCategoryIndex: 0,
      activeSubStepIndex: 0,
      progressPercent: 0,
      steps: [], // status records from API
      tenant: {},
      plan: 'growth' // default plan, will be loaded from billing
    };

    function readOnboardingContext() {
      try {
        return JSON.parse(localStorage.getItem(ONBOARDING_CONTEXT_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function writeOnboardingContext(nextContext) {
      localStorage.setItem(ONBOARDING_CONTEXT_KEY, JSON.stringify(nextContext));
    }

    function mergeOnboardingContext(patch) {
      const current = readOnboardingContext();
      const next = {
        ...current,
        ...patch,
        tenant: {
          ...(current.tenant || {}),
          ...(patch.tenant || {})
        },
        steps: {
          ...(current.steps || {}),
          ...(patch.steps || {})
        }
      };
      writeOnboardingContext(next);
      return next;
    }

    function rememberOnboardingStep(stepKey, metadata) {
      const normalizedStepKey = stepKey === "website-basics" ? "website" : stepKey;
      
      const patch = {
        tenant: {
          id: tenantId,
          name: metadata.churchName || state.tenant.name || localStorage.getItem("churchos.tenantName") || "",
          subdomain: state.tenant.subdomain || localStorage.getItem("churchos.subdomain") || "",
          subdomainHost: state.tenant.subdomainHost || localStorage.getItem("churchos.tenantHost") || "",
          customDomain: metadata.customDomain || state.tenant.customDomain || "",
          country: metadata.country || state.tenant.country || "",
          city: metadata.city || state.tenant.city || "",
          plan: state.plan || "growth"
        },
        steps: {
          [normalizedStepKey]: {
            ...metadata,
            updatedAt: new Date().toISOString()
          }
        }
      };

      if (metadata.ownerName || metadata.ownerEmail) {
        patch.owner = {
          name: metadata.ownerName || readOnboardingContext().owner?.name || localStorage.getItem("churchos.ownerName") || "",
          email: metadata.ownerEmail || readOnboardingContext().owner?.email || localStorage.getItem("churchos.ownerEmail") || ""
        };
      }

      return mergeOnboardingContext(patch);
    }

    function tenantHeaders() {
      const context = readOnboardingContext();
      return {
        'x-tenant-id': tenantId,
        'x-tenant-name': encodeURIComponent(context.tenant?.name || localStorage.getItem("churchos.tenantName") || ""),
        'x-tenant-subdomain': encodeURIComponent(context.tenant?.subdomain || localStorage.getItem("churchos.subdomain") || ""),
        'x-churchos-onboarding-context': encodeURIComponent(JSON.stringify(context)),
        'Authorization': `Bearer ${token}`
      };
    }

    // Toast utility
    const toastEl = document.getElementById("toast");
    const toastMsg = document.getElementById("toastMessage");
    function showToast(msg, error = false) {
      toastMsg.textContent = msg;
      toastEl.className = "toast-container show";
      if (error) {
        toastEl.style.background = "#dc2626";
      } else {
        toastEl.style.background = "var(--ink)";
      }
      setTimeout(() => {
        toastEl.className = "toast-container";
      }, 3000);
    }

    // API fetch utilities
    async function apiGet(endpoint) {
      const res = await fetch(endpoint, {
        method: 'GET',
        headers: tenantHeaders()
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'API request failed');
      }
      return res.json();
    }

    async function apiPatch(endpoint, bodyData) {
      const res = await fetch(endpoint, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          ...tenantHeaders()
        },
        body: JSON.stringify(bodyData)
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Update failed');
      }
      return res.json();
    }

    async function apiPost(endpoint, bodyData = {}) {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...tenantHeaders()
        },
        body: JSON.stringify(bodyData)
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Operation failed');
      }
      return res.json();
    }

    // Load onboarding data from API
    async function loadOnboarding() {
      try {
        const resData = await apiGet('/api/onboarding');
        const data = resData.data;
        
        const cachedContext = readOnboardingContext();
        state.steps = data.steps;
        state.tenant = {
          ...(data.tenant || {}),
          ...(cachedContext.tenant || {})
        };
        state.progressPercent = data.progressPercent;

        // Determine plan by querying subscription
        try {
          const subData = await apiGet('/api/billing-subscription-management/current');
          const activePlan = subData?.plan || subData?.data?.subscription?.plan || subData?.data?.plan;
          if (activePlan) {
            state.plan = activePlan.slug || 'growth';
          }
        } catch (subErr) {
          console.warn('Subscription fetch warning (defaulting to Growth plan):', subErr.message);
        }

        mergeOnboardingContext({
          tenant: {
            id: tenantId,
            name: state.tenant.name || localStorage.getItem("churchos.tenantName") || "",
            subdomain: state.tenant.subdomain || localStorage.getItem("churchos.subdomain") || "",
            subdomainHost: state.tenant.subdomainHost || localStorage.getItem("churchos.tenantHost") || "",
            customDomain: state.tenant.customDomain || "",
            country: state.tenant.country || "",
            city: state.tenant.city || "",
            plan: state.plan || "growth"
          }
        });
        localStorage.setItem("churchos.tenantName", state.tenant.name || "");
        localStorage.setItem("churchos.subdomain", state.tenant.subdomain || "");
        localStorage.setItem("churchos.tenantHost", state.tenant.subdomainHost || (state.tenant.subdomain ? `${state.tenant.subdomain}.churched.online` : ""));

        renderCategoryTabs();
        renderActiveStep();
      } catch (err) {
        console.error(err);
        showToast('Failed to load onboarding data: ' + err.message, true);
      }
    }

    function isStepKeyCompleted(stepKey) {
      const apiStep = state.steps.find(s => s.stepKey === stepKey);
      return apiStep && (apiStep.status === 'completed' || apiStep.status === 'skipped');
    }

    function isSubStepCompleted(sub) {
      const apiStep = state.steps.find(s => s.stepKey === sub.stepKey) || {};
      let meta = {};
      if (apiStep.metadataJson) {
        try { meta = JSON.parse(apiStep.metadataJson); } catch {}
      }
      meta = {
        ...(readOnboardingContext().steps?.[sub.stepKey] || {}),
        ...meta
      };

      if (sub.index === 0) {
        return !!(meta.email || meta.phone || meta.churchName);
      }
      if (sub.index === 1) {
        return !!(meta.address || meta.city);
      }
      if (sub.index === 2) {
        return !!(meta.serviceTimes && meta.serviceTimes.length > 0);
      }
      return isStepKeyCompleted(sub.stepKey);
    }

    // Render Category Tabs on top
    function renderCategoryTabs() {
      progressLabel.textContent = `${state.progressPercent}% Completed`;
      renderCategoryProgressSteps('categoryProgressContainer');
    }

    function renderCategoryProgressSteps(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;

      let html = '';

      categoriesDef.forEach((cat, idx) => {
        const isActive = idx === state.activeCategoryIndex;
        let isCompleted = false;

        if (idx === 0) {
          isCompleted = isStepKeyCompleted('profile');
        } else if (idx === 1) {
          isCompleted = isStepKeyCompleted('logo') && isStepKeyCompleted('website') && isStepKeyCompleted('domain');
        } else if (idx === 2) {
          isCompleted = isStepKeyCompleted('modules') && isStepKeyCompleted('giving') && isStepKeyCompleted('invite');
        }

        let circleStyle = '';
        let labelStyle = '';

        if (isCompleted) {
          circleStyle = 'background-color:#16a34a; border:2px solid #16a34a; color:white;';
          labelStyle = 'color:var(--ink); font-weight:700;';
        } else if (isActive) {
          circleStyle = 'background-color:var(--solid); border:2px solid var(--accent); color:var(--accent); box-shadow: 0 0 0 4px var(--accent-soft);';
          labelStyle = 'color:var(--accent); font-weight:700;';
        } else {
          circleStyle = 'background-color:var(--bg); border:2px solid var(--line); color:var(--muted);';
          labelStyle = 'color:var(--muted); font-weight:500;';
        }

        html += `
          <div class="progress-step" onclick="switchCategory(${idx})">
            <div class="step-circle" style="${circleStyle}">
              ${idx + 1}
            </div>
            <span class="step-label" style="${labelStyle}">${cat.title}</span>
          </div>
        `;

        if (idx < categoriesDef.length - 1) {
          const nextCompleted = isCompleted;
          const currentLineStyle = nextCompleted ? 'background-color:#16a34a;' : 'background-color:var(--line);';
          html += `
            <div class="step-line" style="${currentLineStyle}"></div>
          `;
        }
      });

      container.innerHTML = html;
    }

    function switchCategory(idx) {
      state.activeCategoryIndex = idx;
      if (idx === 3) {
        state.activeSubStepIndex = -1;
      } else {
        state.activeSubStepIndex = wizardSubSteps.find(s => s.category === idx).index;
      }
      renderCategoryTabs();
      renderActiveStep();
    }

    function goToSubStep(index) {
      if (index >= 0 && index < wizardSubSteps.length) {
        state.activeSubStepIndex = index;
        state.activeCategoryIndex = wizardSubSteps[index].category;
        renderCategoryTabs();
        renderActiveStep();
      }
    }

    function goBackSubStep() {
      if (state.activeSubStepIndex > 0) {
        goToSubStep(state.activeSubStepIndex - 1);
      } else if (state.activeCategoryIndex > 0) {
        switchCategory(state.activeCategoryIndex - 1);
        const subSteps = wizardSubSteps.filter(s => s.category === state.activeCategoryIndex);
        goToSubStep(subSteps[subSteps.length - 1].index);
      }
    }

    function advanceWizard() {
      if (state.activeSubStepIndex < wizardSubSteps.length - 1) {
        goToSubStep(state.activeSubStepIndex + 1);
      } else {
        switchCategory(3); // Switch to Review & Launch
      }
    }

    // Handles skipping active sub-step
    async function skipSubStep() {
      const sub = wizardSubSteps[state.activeSubStepIndex];
      try {
        await apiPost(`/api/onboarding/${sub.stepKey}/skip`, {});
        showToast('Step skipped');
        await loadOnboarding();
        advanceWizard();
      } catch (err) {
        showToast(err.message || 'Unable to skip this step', true);
      }
    }

    // Render Left vertical sub-nav progress
    function renderSubNavHtml() {
      const subStepsInCat = wizardSubSteps.filter(s => s.category === state.activeCategoryIndex);
      return `
        <div class="wizard-subnav">
          ${subStepsInCat.map(sub => {
            const isActive = sub.index === state.activeSubStepIndex;
            const isCompleted = isSubStepCompleted(sub);
            
            let cssClass = 'substep-item';
            if (isActive) cssClass += ' active';
            else if (isCompleted) cssClass += ' completed';
            
            return `
              <div class="${cssClass}" onclick="goToSubStep(${sub.index})">
                <span class="substep-dot">
                  ${isCompleted ? '<i data-lucide="check" style="width:12px; height:12px;"></i>' : sub.index - wizardSubSteps.filter(s => s.category === state.activeCategoryIndex)[0].index + 1}
                </span>
                <span>${sub.title}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    // Render Review Summary Grid for Tab 4
    function renderReviewGrid() {
      const context = readOnboardingContext();
      const apiSteps = state.steps;
      
      function getMeta(stepKey) {
        const s = apiSteps.find(x => x.stepKey === stepKey) || {};
        let m = {};
        if (s.metadataJson) {
          try { m = JSON.parse(s.metadataJson); } catch {}
        }
        return {
          ...(context.steps?.[stepKey] || {}),
          ...m
        };
      }
      
      const profileMeta = getMeta('profile');
      const logoMeta = getMeta('logo');
      const websiteMeta = getMeta('website');
      const domainMeta = getMeta('domain');
      const modulesMeta = getMeta('modules');
      const givingMeta = getMeta('giving');
      const inviteMeta = getMeta('invite');

      const isProfileOk = !!(profileMeta.churchName || state.tenant.name) && !!(profileMeta.email && profileMeta.phone);
      const isLocationOk = !!(profileMeta.address && (profileMeta.city || state.tenant.city));
      const isScheduleOk = !!(profileMeta.serviceTimes && profileMeta.serviceTimes.length > 0);
      const isLogoOk = !!logoMeta.logoUrl;
      const isWebsiteOk = !!(websiteMeta.homepageTitle && websiteMeta.homepageSubtitle);

      return `

          <div class="review-section ${isProfileOk ? '' : 'warning'}" onclick="goToSubStep(0)">
            <div class="review-section-header">

              <span class="status-badge ${isProfileOk ? 'ok' : 'missing'}">${isProfileOk ? 'Ready' : 'Missed'}</span>
            </div>
            <div class="review-section-body">
              <div class="review-item"><span>Church Name</span><span>${profileMeta.churchName || state.tenant.name || '—'}</span></div>
              <div class="review-item"><span>Owner Name</span><span>${profileMeta.ownerName || context.owner?.name || '—'}</span></div>
              <div class="review-item"><span>Owner Email</span><span>${profileMeta.ownerEmail || context.owner?.email || '—'}</span></div>
              <div class="review-item"><span>Public Email</span><span>${profileMeta.email || '—'}</span></div>
              <div class="review-item"><span>Phone</span><span>${profileMeta.phoneCode || ''} ${profileMeta.phone || '—'}</span></div>
              <div class="review-item"><span>Timezone</span><span>${profileMeta.timezone || '—'}</span></div>
            </div>
          </div>

          <div class="review-section ${isLocationOk ? '' : 'warning'}" onclick="goToSubStep(1)">
            <div class="review-section-header">
              <h3>Church Location</h3>
              <span class="status-badge ${isLocationOk ? 'ok' : 'missing'}">${isLocationOk ? 'Ready' : 'Missed'}</span>
            </div>
            <div class="review-section-body">
              <div class="review-item"><span>Country</span><span>${profileMeta.country || state.tenant.country || '—'}</span></div>
              <div class="review-item"><span>City</span><span>${profileMeta.city || state.tenant.city || '—'}</span></div>
              <div class="review-item"><span>Office Address</span><span>${profileMeta.address || '—'}</span></div>
              <div class="review-item"><span>Venue Address</span><span>${profileMeta.isVenueDifferent ? (profileMeta.venueAddress || '—') : 'Same as Office'}</span></div>
            </div>
          </div>

          <div class="review-section ${isScheduleOk ? '' : 'warning'}" onclick="goToSubStep(2)">
            <div class="review-section-header">
              <h3>Service Schedule</h3>
              <span class="status-badge ${isScheduleOk ? 'ok' : 'missing'}">${isScheduleOk ? 'Ready' : 'Missed'}</span>
            </div>
            <div class="review-section-body">
              <div class="review-item"><span>Service Times</span><span>${profileMeta.serviceTimes ? profileMeta.serviceTimes.map(st => `${st.day} @ ${st.time}`).join(', ') : '—'}</span></div>
            </div>
          </div>

          <div class="review-section ${isLogoOk ? '' : 'warning'}" onclick="goToSubStep(3)">
            <div class="review-section-header">
              <h3>Branding & Logos</h3>
              <span class="status-badge ${isLogoOk ? 'ok' : 'warning'}">${isLogoOk ? 'Ready' : 'Skipped'}</span>
            </div>
            <div class="review-section-body">
              <div class="review-item"><span>Main Logo</span><span>${logoMeta.logoUrl ? (logoMeta.logoUrl.startsWith('data:') ? 'Uploaded' : 'Linked') : '—'}</span></div>
              <div class="review-item"><span>Dark Logo</span><span>${logoMeta.darkLogoUrl ? (logoMeta.darkLogoUrl.startsWith('data:') ? 'Uploaded' : 'Linked') : '—'}</span></div>
              <div class="review-item"><span>Favicon</span><span>${logoMeta.faviconUrl ? (logoMeta.faviconUrl.startsWith('data:') ? 'Uploaded' : 'Linked') : '—'}</span></div>
            </div>
          </div>

          <div class="review-section ${isWebsiteOk ? '' : 'warning'}" onclick="goToSubStep(4)">
            <div class="review-section-header">
              <h3>Website Info</h3>
              <span class="status-badge ${isWebsiteOk ? 'ok' : 'missing'}">${isWebsiteOk ? 'Ready' : 'Missed'}</span>
            </div>
            <div class="review-section-body">
              <div class="review-item"><span>Homepage Title</span><span>${websiteMeta.homepageTitle || '—'}</span></div>
              <div class="review-item"><span>Tagline</span><span>${websiteMeta.homepageSubtitle || '—'}</span></div>
              <div class="review-item"><span>Vision</span><span>${websiteMeta.vision ? (websiteMeta.vision.substring(0, 30) + (websiteMeta.vision.length > 30 ? '...' : '')) : '—'}</span></div>
              <div class="review-item"><span>Mission</span><span>${websiteMeta.mission ? (websiteMeta.mission.substring(0, 30) + (websiteMeta.mission.length > 30 ? '...' : '')) : '—'}</span></div>

                modulesMeta.enabledModuleKeys 
                  ? modulesMeta.enabledModuleKeys
                      .filter(k => PLATFORM_MODULES.some(m => m.key === k))
                      .map(k => {
                        const found = PLATFORM_MODULES.find(m => m.key === k);
                        return found ? found.name : k;
                      }).join(', ') 
                  : 'CMS & Pages, Blog, Member Management'
              }</span></div>

              <span class="status-badge ok">Ready</span>

              <div class="review-item"><span>Payment Gateways</span><span>${
                (() => {
                  const val = givingMeta.gatewayProvider || 'native';

            </div>

        </div>
      `;

    // Active Step Template Renderer
    function renderActiveStep() {
      const category = categoriesDef[state.activeCategoryIndex];
      
      if (state.activeCategoryIndex === 3) {
        wizardCard.innerHTML = `
          <div class="wizard-header" style="display:flex; flex-direction:row; justify-content:space-between; align-items:center; gap:20px; width:100%; margin-bottom: 24px;">
            <div>
              <div class="eyebrow">Step 10 of 10</div>
              <h2 style="margin: 4px 0;">${category.title}</h2>
              <p style="margin: 0;">${category.description}</p>
            </div>
            <div id="categoryProgressContainer" style="display:flex; align-items:flex-start; gap:0; flex-shrink:0;"></div>
          </div>
          
          ${renderReviewGrid()}
          
          <div class="wizard-footer" style="justify-content: flex-end;">
            <button class="btn btn-primary" type="button" style="min-height:48px; padding-inline:36px;" onclick="completeOnboarding()">
              Launch Platform <i data-lucide="rocket"></i>
            </button>

        `;

        } catch {}
      }

        ...(readOnboardingContext().steps?.[sub.stepKey] || {}),
        ...metadata
      };

      let formHtml = '';

      switch(state.activeSubStepIndex) {

          formHtml = `

              <div class="field full">

                <input id="profileChurchName" value="${metadata.churchName || state.tenant.name || ''}" placeholder="e.g. Grace Fellowship" required />

              <div class="field">
                <label for="profileOwnerName">Owner Name</label>
                <input id="profileOwnerName" value="${metadata.ownerName || readOnboardingContext().owner?.name || localStorage.getItem('churchos.ownerName') || ''}" placeholder="e.g. Pastor John Doe" required />
              </div>

              <div class="field">
                <label for="profileOwnerEmail">Owner Email</label>
                <input id="profileOwnerEmail" type="email" value="${metadata.ownerEmail || readOnboardingContext().owner?.email || localStorage.getItem('churchos.ownerEmail') || ''}" placeholder="e.g. pastor@church.org" required />

                           return c ? `<span style="font-size:12px; color:var(--muted); text-transform:uppercase;">${c.code.toLowerCase()}</span> ${c.dialCode}` : (metadata.phoneCode || '+1');
                         })()}
                       </span>
                       <i data-lucide="chevron-down" style="width:16px; height:16px; color:var(--muted);"></i>
                     </div>
                     <div class="modern-select-dropdown">
                       <div class="modern-select-search" onclick="event.stopPropagation()">
                         <i data-lucide="search"></i>
                         <input type="text" placeholder="Search code..." oninput="filterOptions(this)" />
                       </div>
                       <div class="modern-select-options-container">
                         ${generatePhoneCodeOptions(metadata.phoneCode || '+1')}
                       </div>
                     </div>
                  </div>
                  <input id="profilePhone" class="phone-input" value="${metadata.phone || ''}" placeholder="e.g. 555-000-0000" />
                </div>
              </div>
              
              <div class="field">
                <label for="profileEmail" style="display:flex; align-items:center;">
                  Church Public Email
                  <span class="tooltip-container">
                    <i data-lucide="info"></i>
                    <span class="tooltip-content">This is the email that people will see on the website.</span>
                  </span>
                </label>
                <input id="profileEmail" type="email" value="${metadata.email || ''}" placeholder="e.g. info@church.org" />
              </div>
            </form>
          `;
          break;
          
        case 1: // profile-location
