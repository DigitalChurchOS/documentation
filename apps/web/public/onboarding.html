<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Church OS — Guided Onboarding Wizard</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Modern Custom Dropdown */
    .modern-select-wrapper {
      position: relative;
      width: 100%;
      font-family: inherit;
      user-select: none;
    }
    .modern-select-trigger {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 12px;
      cursor: pointer;
      color: var(--charcoal);
      font-weight: 500;
      transition: all 0.2s;
      height: 48px;
      font-size: 14px;
    }
    .modern-select-wrapper.open .modern-select-trigger {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .modern-select-trigger i {
      color: var(--charcoal);
      transition: transform 0.2s;
      width: 16px; height: 16px;
    }
    .modern-select-wrapper.open .modern-select-trigger i {
      transform: rotate(180deg);
      color: var(--accent);
    }
    .modern-select-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      z-index: 100;
      overflow: hidden;
      display: none;
      padding: 6px;
    }
    .modern-select-wrapper.open .modern-select-dropdown {
      display: block;
    }
    .modern-select-search {
      padding: 6px;
      position: relative;
    }
    .modern-select-search i,
    .modern-select-search svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }
    .modern-select-search input {
      width: 100%;
      padding: 10px 10px 10px 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg-2);
      font: inherit;
      outline: none;
      font-size: 14px;
      color: var(--charcoal);
    }
    .modern-select-search input:focus {
      border-color: var(--accent);
    }
    .modern-select-options-container {
      max-height: 250px;
      overflow-y: auto;
    }
    .modern-option {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--charcoal);
      transition: background 0.2s;
      font-weight: 500;
      font-size: 14px;
    }
    .modern-option:hover {
      background: var(--soft);
    }
    .modern-option.selected {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }
    .modern-option.selected::after {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* Modern Phone Input Group */
    .phone-input-group {
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg-2);
      overflow: visible; /* To allow dropdown to break out */
      height: 48px;
      transition: all 0.2s;
    }
    .phone-input-group:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .phone-input-group .modern-select-wrapper {
      width: 100px;
      height: 100%;
    }
    .phone-input-group .modern-select-trigger {
      border: none;
      border-right: 1px solid var(--line);
      border-radius: 12px 0 0 12px;
      background: transparent;
      height: 100%;
      padding: 0 12px;
    }
    .phone-input-group .modern-select-wrapper.open .modern-select-trigger {
      box-shadow: none;
      border-color: transparent;
      border-right: 1px solid var(--line);
    }
    .phone-input-group .modern-select-dropdown {
      width: 200px; /* Wider than trigger */
      top: calc(100% + 4px);
    }
    .phone-input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0 16px;
      height: 100%;
      outline: none;
      color: var(--charcoal);
      font-family: inherit;
      font-size: 14px;
    }

    /* Modern Time Input */
    .modern-time-input {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 16px;
      font-family: inherit;
      font-size: 14px;
      color: var(--charcoal);
      outline: none;
      transition: all 0.2s;
      height: 48px;
    }
    .modern-time-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* Delete Button */
    .btn-icon-delete {
      background: none;
      border: none;
      color: #ef4444; /* Red */
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      height: 48px;
      width: 48px;
    }
    .btn-icon-delete:hover {
      background: #fee2e2;
    }
    .btn-icon-delete i {
      width: 20px; height: 20px;
    }

    /* Tooltips */
    .tooltip-container {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      cursor: pointer;
      color: var(--muted);
    }
    .tooltip-container i {
      width: 16px; height: 16px;
    }
    .tooltip-content {
      visibility: hidden;
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f2937;
      color: #fff;
      text-align: center;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      width: max-content;
      max-width: 250px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      font-weight: normal;
      line-height: 1.4;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .tooltip-container:hover .tooltip-content {
      visibility: visible;
      opacity: 1;
    }
    .tooltip-content::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: #1f2937 transparent transparent transparent;
    }

    :root {
      --bg: #f8f4ed;
      --bg-2: #fffaf3;
      --ink: #15171a;
      --muted: #73706b;
      --soft: rgba(255,255,255,.72);
      --solid: #ffffff;
      --line: rgba(21,23,26,.1);
      --accent: #f97316;
      --accent-2: #ffc27a;
      --accent-soft: rgba(249,115,22,.12);
      --charcoal: #1d1d1c;
      --shadow: 0 30px 90px rgba(61, 44, 21, .12);
      --shadow-soft: 0 18px 44px rgba(61, 44, 21, .08);
      --radius: 34px;
      --radius-sm: 22px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="dark"] {
      --bg: #151413;
      --bg-2: #1d1b19;
      --ink: #f7f0e8;
      --muted: #aaa29a;
      --soft: rgba(37,36,34,.68);
      --solid: #22201e;
      --line: rgba(255,255,255,.1);
      --accent-soft: rgba(249,115,22,.18);
      --shadow: 0 30px 100px rgba(0,0,0,.35);
      --shadow-soft: 0 18px 50px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      background:
        radial-gradient(circle at 15% 10%, var(--accent-soft), transparent 28%),
        radial-gradient(circle at 92% 4%, rgba(91, 33, 182, .12), transparent 24%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: .18;
      background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at top, black 0%, transparent 85%);
    }

    .nav {
      height: 72px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--solid) 65%, transparent);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: clamp(16px, 4vw, 40px);
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-weight: 950;
      letter-spacing: -.04em;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn, .icon-btn {
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .25s ease, box-shadow .25s ease, background .25s ease;
    }

    .btn {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      background: var(--soft);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      color: var(--ink);
      background: var(--soft);
      border: 1px solid var(--line);
    }

    .btn:hover, .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: 0;
      box-shadow: 0 14px 28px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    /* Onboarding Layout */
    .onboarding-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      flex: 1;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: color-mix(in srgb, var(--solid) 30%, transparent);
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .steps-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 10px;
      border-radius: 18px;
      cursor: pointer;
      transition: .25s ease;
      color: var(--muted);
      font-weight: 750;
      font-size: 13px;
      text-align: center;
      border: 1px solid transparent;
    }

    .step-item:hover {
      background: var(--accent-soft);
      color: var(--ink);
    }

    .step-item.active {
      background: var(--solid);
      border: 1px solid var(--line);
      color: var(--ink);
      box-shadow: var(--shadow-soft);
    }

    .step-item.completed {
      color: #16a34a;
    }

    .step-num {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      transition: .25s ease;
    }

    .step-item.active .step-num {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border: 0;
    }

    .step-item.completed .step-num {
      background: rgba(22, 163, 74, 0.1);
      color: #16a34a;
      border-color: rgba(22, 163, 74, 0.2);
    }

    .wizard-content {
      padding: clamp(24px, 5vw, 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .wizard-card {
      width: 100%;
      max-width: 680px;
      padding: clamp(24px, 4vw, 48px);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--solid) 68%, transparent);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 30px;
      transition: opacity .3s ease, transform .3s ease;
    }

    .wizard-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .wizard-header h2 {
      font-size: 32px;
      letter-spacing: -.05em;
      margin: 0;
    }

    .wizard-header p {
      color: var(--muted);
      line-height: 1.6;
      margin: 0;
      font-size: 15px;
    }

    /* Forms */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--solid) 75%, transparent);
      color: var(--ink);
      border-radius: 16px;
      min-height: 50px;
      padding: 0 15px;
      outline: 0;
      transition: border .25s ease, box-shadow .25s ease;
    }

    textarea {
      min-height: 100px;
      padding-top: 12px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 55%, transparent);
      box-shadow: 0 0 0 5px var(--accent-soft);
    }

    .wizard-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 24px;
    }

    /* Theme Cards and Mode Options */
    .selection-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .select-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      background: color-mix(in srgb, var(--solid) 40%, transparent);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: .25s ease;
    }

    .select-card:hover {
      background: var(--accent-soft);
      transform: translateY(-2px);
    }

    .select-card.active {
      border-color: var(--accent);
      background: var(--solid);
      box-shadow: var(--shadow-soft);
    }

    .select-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
    }

    .select-card h4 {
      margin: 0;
      font-size: 14px;
      letter-spacing: -.03em;
    }

    .select-card p {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Modules checkbox rows */
    .module-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--solid) 40%, transparent);
      margin-bottom: 10px;
      transition: .2s ease;
    }

    .module-item.active {
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
      background: var(--solid);
    }

    .module-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .module-info-text h4 {
      margin: 0;
      font-size: 14px;
      letter-spacing: -.03em;
    }

    .module-info-text p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }

    .module-badge {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
    }

    .module-badge.locked {
      background: rgba(220,38,38,.08);
      color: #dc2626;
      border-color: rgba(220,38,38,.15);
    }

    /* Custom Checkbox Toggle */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: color-mix(in srgb, var(--muted) 35%, transparent);
      transition: .3s;
      border-radius: 34px;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--accent);
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(100px);
      opacity: 0;
      padding: 14px 22px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--bg);
      font-weight: 900;
      font-size: 14px;
      box-shadow: var(--shadow);
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: transform .35s cubic-bezier(.175, .885, .32, 1.275), opacity .3s ease;
    }
    .toast-container.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Final Checklist Summary */
    .summary-list {
      display: grid;
      gap: 12px;
    }
    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 16px;
      font-size: 13px;
    }

    @media (max-width: 820px) {
      .onboarding-grid {
        display: flex;
        flex-direction: column;
      }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 16px;
        align-items: center;
        height: auto;
        z-index: 100;
        background: var(--solid);
      }
      .sidebar > div:first-child {
        display: none;
      }
      .steps-list {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 8px;
        width: 100%;
        padding-bottom: 8px;
      }
      .step-item {
        padding: 8px;
        justify-content: center;
        min-width: 60px;
        border-radius: 12px;
      }
      .step-item span:not(.step-num) {
        display: none;
      }
      .step-num {
        width: 36px;
        height: 36px;
        font-size: 14px;
      }
      .wizard-content {
        padding: 20px 16px;
      }
      .wizard-card {
        padding: 24px 16px;
      }
      /* Stack form fields in 1 column on mobile */
      .form-grid, .selection-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-theme="light">
  <script src="/countries.js"></script>

  <main class="onboarding-grid">
    <!-- Sidebar Wizard Steps Indicator -->
    <aside class="sidebar">
      <div style="display:flex; flex-direction:column; gap:4px; margin-bottom: 8px;">
        <span style="font-size:11px; font-weight:800; text-transform:uppercase; color:var(--accent); letter-spacing:0.1em;">Setup Progress</span>
        <span style="font-weight:900; font-size:16px;" id="progressLabel">0% Completed</span>
      </div>
      
      <nav class="steps-list" id="stepsSidebarList">
        <!-- Generated Dynamically -->
      </nav>
    </aside>

    <!-- Main Content Stage -->
    <section class="wizard-content">
      <div class="wizard-card" id="wizardCard">
        <!-- Active Onboarding Step Rendered Here -->
      </div>
    </section>
  </main>

  <div class="toast-container" id="toast">
    <i data-lucide="info" id="toastIcon"></i>
    <span id="toastMessage">Step updated successfully!</span>
  </div>

  <script>
    const body = document.body;
    const progressLabel = document.getElementById("progressLabel");
    const stepsSidebarList = document.getElementById("stepsSidebarList");
    const wizardCard = document.getElementById("wizardCard");

    // Dynamic Dropdown Generators
    function generateCountryOptions(selectedValue) {
      if (!window.WORLD_COUNTRIES) return '';
      return window.WORLD_COUNTRIES.map(c => `
        <div class="modern-option ${c.name === selectedValue ? 'selected' : ''}" 
             onclick="selectOption(event, this, 'profileCountry', '${c.name.replace(/'/g, "\\'")}', '${c.emoji} ${c.name.replace(/'/g, "\\'")}')">
          <span style="display:flex; align-items:center; gap:8px;">${c.emoji} ${c.name}</span>
        </div>
      `).join('');
    }

    function generatePhoneCodeOptions(selectedValue) {
      if (!window.WORLD_COUNTRIES) return '';
      return window.WORLD_COUNTRIES.map(c => `
        <div class="modern-option ${c.dialCode === selectedValue ? 'selected' : ''}" 
             onclick="selectOption(event, this, 'profilePhoneCode', '${c.dialCode}', '<span style=\\'font-size:12px; color:var(--muted); text-transform:uppercase;\\'>${c.code.toLowerCase()}</span> ${c.dialCode}')">
          <span style="display:flex; align-items:center; gap:8px;">
            ${c.emoji} ${c.name} (${c.dialCode})
          </span>
        </div>
      `).join('');
    }

    function generateTimezoneOptions(selectedValue) {
      const timezones = Intl.supportedValuesOf ? Intl.supportedValuesOf('timeZone') : ['UTC', 'America/Edmonton', 'Africa/Nairobi', 'Europe/London'];
      return timezones.map(tz => `
        <div class="modern-option ${tz === selectedValue ? 'selected' : ''}" 
             onclick="selectOption(event, this, 'profileTimezone', '${tz}', '${tz}')">
          ${tz}
        </div>

      el.classList.toggle('open');
      lucide.createIcons();

    function selectOption(event, el, inputId, value, textHtml) {
      event.stopPropagation();
      const customSelect = el.closest('.modern-select-wrapper');
      
      // update hidden input
      document.getElementById(inputId).value = value;
      
      // update selected text HTML
      customSelect.querySelector('.modern-select-trigger span').innerHTML = textHtml;
      
      // update selected class
      customSelect.querySelectorAll('.modern-option').forEach(item => item.classList.remove('selected'));
      el.classList.add('selected');
      
      // close dropdown
      customSelect.classList.remove('open');
      lucide.createIcons();
      
      // Trigger change event if needed
      const evt = new Event('change');
      document.getElementById(inputId).dispatchEvent(evt);

    // API fetch utilities
    async function apiGet(endpoint) {
      const res = await fetch(endpoint, {
        method: 'GET',
        headers: {
          'x-tenant-id': tenantId,
          'Authorization': `Bearer ${token}`
        }
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'API request failed');
      }
      return res.json();
    }

    async function apiPatch(endpoint, bodyData) {
      const res = await fetch(endpoint, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'x-tenant-id': tenantId,
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(bodyData)
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Update failed');
      }
      return res.json();
    }

    async function apiPost(endpoint, bodyData = {}) {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-tenant-id': tenantId,
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(bodyData)
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Operation failed');
      }
      return res.json();
    }

    // Load onboarding data from API
    async function loadOnboarding() {
      try {
        const resData = await apiGet('/api/onboarding');
        const data = resData.data;
        
        state.steps = data.steps;
        state.tenant = data.tenant;
        state.progressPercent = data.progressPercent;
        
        state.progressPercent = data.progressPercent;

        // Determine plan by querying subscription
        try {
          const subData = await apiGet('/api/billing-subscription-management/current');
          const activePlan = subData?.plan || subData?.data?.subscription?.plan || subData?.data?.plan;
          if (activePlan) {
            state.plan = activePlan.slug || 'growth';
          }
        } catch (subErr) {
          console.warn('Subscription fetch warning (defaulting to Growth plan):', subErr.message);
        }

        renderSidebar();
        renderActiveStep();
      } catch (err) {
        console.error(err);
        showToast('Failed to load onboarding data: ' + err.message, true);
      }
    }

    // Render step checklist sidebar
    function renderSidebar() {
      progressLabel.textContent = `${state.progressPercent}% Completed`;
      
      stepsSidebarList.innerHTML = onboardingStepsDef.map((step, index) => {
        // Find completion status in API steps list
        const apiStep = state.steps.find(s => s.stepKey === step.stepKey);
        const isCompleted = apiStep && (apiStep.status === 'completed' || apiStep.status === 'skipped');
        const isActive = index === state.currentStepIndex;
        
        let statusClass = '';
        if (isActive) statusClass = 'active';
        else if (isCompleted) statusClass = 'completed';

        return `
          <div class="step-item ${statusClass}" onclick="goToStep(${index})">
            <span class="step-num">${index + 1}</span>
            <span>${step.title}</span>
          </div>
        `;
      }).join("");
    }

    function goToStep(index) {
      if (index >= 0 && index < onboardingStepsDef.length) {

    // Handles skipping steps
    async function skipStep() {
      const step = onboardingStepsDef[state.currentStepIndex];
      try {
        await apiPost(`/api/onboarding/${step.stepKey}/skip`, {});
        showToast('Step skipped');
        await loadOnboarding();
        goToStep(state.currentStepIndex + 1);
      } catch (err) {
        showToast(err.message || 'Unable to skip this step', true);
      }
    }

    // Handles Step form submissions
    async function submitActiveStep() {
      const step = onboardingStepsDef[state.currentStepIndex];
      const form = document.getElementById("stepForm");

      try {
        let bodyData = {};
        let url = '';

        switch(step.stepKey) {
          case 'profile':
            const isVenueDifferent = document.getElementById("profileVenueCheck").checked;
            const stRows = document.querySelectorAll('.service-time-row');
            let serviceTimes = [];
            stRows.forEach(row => {
              const day = row.querySelector('.st-day-val').value;
              const time = row.querySelector('.st-time-val').value;
              if (day && time) serviceTimes.push({ day, time });
            });

            url = '/api/onboarding/profile';
            bodyData = {
              address: document.getElementById("profileAddress").value.trim(),
              isVenueDifferent: isVenueDifferent,
              venueAddress: isVenueDifferent ? document.getElementById("profileVenueAddress").value.trim() : null,
              phoneCode: document.getElementById("profilePhoneCode").value,
              phone: document.getElementById("profilePhone").value.trim(),
              email: document.getElementById("profileEmail").value.trim(),
              serviceTimes: serviceTimes,
              timezone: document.getElementById("profileTimezone").value
            };
            break;
          case 'logo':
            url = '/api/onboarding/logo';
            bodyData = {
              logoUrl: document.getElementById("logoUrl").value.trim(),
              darkLogoUrl: document.getElementById("darkLogoUrl").value.trim(),
              faviconUrl: document.getElementById("faviconUrl").value.trim()
            };
            break;

          case 'modules':
            url = '/api/onboarding/modules';
            const chks = document.querySelectorAll(".module-chk");
            const keys = ['website-cms', 'theme-engine', 'domain-tenant-management', 'billing-subscription-management']; // core defaults
            chks.forEach(chk => {
              if (chk.checked) {
                if (chk.value === 'members') keys.push('member-crm');
                if (chk.value === 'giving') keys.push('giving-donations');
                if (chk.value === 'livestream') keys.push('livestream');
              }
            });
            bodyData = { enabledModuleKeys: keys };
            break;
          case 'website':
            url = '/api/onboarding/website-basics';
            bodyData = {
              homepageTitle: document.getElementById("homepageTitle").value.trim(),
              homepageSubtitle: document.getElementById("homepageSubtitle").value.trim(),
              aboutText: document.getElementById("aboutText").value.trim(),
              primaryCtaText: document.getElementById("primaryCtaText").value.trim(),
              primaryCtaUrl: document.getElementById("primaryCtaUrl").value.trim()
            };
            break;
          case 'domain':
            url = '/api/onboarding/domain';
            bodyData = {
              customDomain: document.getElementById("customDomain").value.trim()
            };
            break;
          case 'giving':
            url = '/api/onboarding/giving';
            bodyData = {
              gatewayProvider: document.getElementById("gatewayProvider").value,
              integrationMode: document.getElementById("integrationMode").value
            };
            break;
          case 'invite':
            // If email is empty, they just continue without inviting
            const emailVal = document.getElementById("inviteEmail").value.trim();
            if (!emailVal) {
              goToStep(state.currentStepIndex + 1);
              return;
            }
            // If they filled it, send invite
            await sendInvitation();
            goToStep(state.currentStepIndex + 1);
            return;
        }

        showToast('Saving step...', false);
        await apiPatch(url, bodyData);
        showToast('Saved successfully!', false);
        
        // Reload onboarding status to update sidebar checkmarks and progress %
        await loadOnboarding();
        
        // Proceed to next step
        setTimeout(() => {
          goToStep(state.currentStepIndex + 1);
        }, 400);

      } catch (err) {
        showToast(err.message || 'An error occurred during save', true);
      }
    }

    // Handles sending team invites
    async function sendInvitation() {
      const email = document.getElementById("inviteEmail").value.trim();
      const roleName = document.getElementById("inviteRole").value;

      if (!email) {
        showToast('Email address is required to invite a team member', true);
        return;
      }

      try {
        showToast('Sending invitation...', false);
        await apiPost('/api/onboarding/invite-team', { email, roleName });
        showToast(`Invitation sent to ${email}!`, false);
        
        // Reset email input
        document.getElementById("inviteEmail").value = '';
        await loadOnboarding();
      } catch (err) {
        showToast(err.message || 'Invitation failed', true);
      }
    }

    // Launch completed onboarding
    async function completeOnboarding() {
      try {
        showToast('Completing onboarding...', false);
        await apiPost('/api/onboarding/complete');
        showToast('Launch success! Entering dashboard...', false);
        
        setTimeout(() => {
          window.location.href = "/admin";
        }, 1200);
      } catch (err) {
        showToast(err.message || 'Launch failed', true);
      }
    }

    // Initialize Page
    loadOnboarding();
  </script>
</body>
</html>
