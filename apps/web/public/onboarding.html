                    </div>
                  </div>
                  
                  <button class="btn btn-primary" type="button" onclick="addPendingInvite()" style="height: 48px; display: flex; align-items: center; justify-content: center; padding: 0 24px; font-weight: 500;">
                    Save
                  </button>
                </div>
                
                <div class="field full" id="addStaffButtonContainer" style="display: ${(!showForm && hasInvites) ? 'block' : 'none'}; margin-top: 4px;">
                  <button class="btn" type="button" onclick="showInviteInputs()" style="width:100%; min-height:42px; background:var(--soft); border:1px solid var(--line); font-weight:500; font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px;">
                    <i data-lucide="plus"></i> Add Staff Member
                  </button>
                </div>
              </div>
            `;
          }
          break;
      }

      wizardCard.innerHTML = `
        <div class="wizard-header" style="display:flex; flex-direction:row; justify-content:space-between; align-items:center; gap:20px; width:100%; margin-bottom: 24px;">
          <div>
            <div class="eyebrow">Step ${sub.index + 1} of 10</div>
            <h2 style="margin: 4px 0;">${sub.title}</h2>
            <p style="margin: 0;">${sub.description}</p>
          </div>
          <div id="categoryProgressContainer" style="display:flex; align-items:flex-start; gap:0; flex-shrink:0;"></div>
        </div>
        
        <div class="wizard-columns">
          <!-- Left Columns (1/3 Width Step List) -->
          ${renderSubNavHtml()}
          
          <!-- Right Columns (2/3 Width Forms) -->
          <div class="wizard-form-container">
            ${formHtml}
            
            <div class="wizard-footer">
              <button class="btn" type="button" id="btnBack" onclick="goBackSubStep()">
                <i data-lucide="arrow-left"></i> Back
              </button>
              
              <div style="display:flex; gap:8px;">
                <button class="btn" type="button" onclick="skipSubStep()">Skip</button>
                <button class="btn btn-primary" type="button" id="btnNext" onclick="submitActiveSubStep()">
                  Save & Continue <i data-lucide="arrow-right"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      `;

      renderCategoryProgressSteps('categoryProgressContainer');
      lucide.createIcons();

      // Inline onclick handler handles invite list building

      // Hook logo upload drag & drop events specifically if on logo step
      if (sub.stepKey === 'logo') {
        setupLogoUploadDragDrop('logo');
        setupLogoUploadDragDrop('darkLogo');
        setupLogoUploadDragDrop('favicon');
      }
    }

    // Handles theme selection cards (retained for customizer if needed)
    function selectThemeCard(themeId) {
      document.getElementById("selectedTheme").value = themeId;
      document.querySelectorAll(".select-card").forEach(card => {
        card.classList.toggle("active", card.dataset.themeId === themeId);
      });
    }

    // Handles Step form submissions
    async function submitActiveSubStep() {
      const sub = wizardSubSteps[state.activeSubStepIndex];
      let bodyData = {};
      let url = '';

      try {
        if (sub.stepKey === 'profile') {
          url = '/api/onboarding/profile';
          
          // Get existing profile metadata to merge
          const apiStep = state.steps.find(s => s.stepKey === 'profile') || {};
          let existingMeta = {};
          if (apiStep.metadataJson) {
            try { existingMeta = JSON.parse(apiStep.metadataJson); } catch {}
          }
          existingMeta = {
            ...(readOnboardingContext().steps?.profile || {}),
            ...existingMeta
          };

          if (state.activeSubStepIndex === 0) {
            bodyData = {
              ...existingMeta,
              churchName: document.getElementById("profileChurchName").value.trim(),
              ownerName: document.getElementById("profileOwnerName").value.trim(),
              ownerEmail: document.getElementById("profileOwnerEmail").value.trim(),
              phoneCode: document.getElementById("profilePhoneCode").value,
              phone: document.getElementById("profilePhone").value.trim(),
              email: document.getElementById("profileEmail").value.trim()
            };
          } else if (state.activeSubStepIndex === 1) {
            const street = document.getElementById("profileStreet").value.trim();
            const unit = document.getElementById("profileUnit").value.trim();
            const poBox = document.getElementById("profilePoBox").value.trim();
            const city = document.getElementById("profileCity").value.trim();
            const provinceState = document.getElementById("profileState").value.trim();
            const zip = document.getElementById("profileZip").value.trim();
            const country = document.getElementById("profileCountry").value;

            const parts = [
              street,
              unit ? `Unit/Suite ${unit}` : '',
              poBox ? poBox : '',
              city,
              provinceState,
              zip,
              country
            ].filter(Boolean);
            const address = parts.join(', ');

            const isVenueDifferent = document.getElementById("profileVenueCheck").checked;
            let venueStreet = '';
            let venueUnit = '';
            let venuePoBox = '';
            let venueCity = '';
            let venueState = '';
            let venueZip = '';
            let venueCountry = '';
            let venueAddress = null;

            if (isVenueDifferent) {
              venueStreet = document.getElementById("venueStreet").value.trim();
              venueUnit = document.getElementById("venueUnit").value.trim();
              venuePoBox = '';
              venueCity = '';
              venueState = '';
              venueZip = '';
              venueCountry = '';

              const venueParts = [
                venueStreet,
                venueUnit
              ].filter(Boolean);
              venueAddress = venueParts.join(', ');
            }

            bodyData = {
              ...existingMeta,
              street,
              unit,
              poBox,
              state: provinceState,
              zip,
              city,
              country,
              address,
              isVenueDifferent: isVenueDifferent,
              venueStreet,
              venueUnit,
              venuePoBox,
              venueCity,
              venueState,
              venueZip,
              venueCountry,
              venueAddress
            };
          } else if (state.activeSubStepIndex === 2) {
            const stRows = document.querySelectorAll('.service-time-row');
            let serviceTimes = [];
            stRows.forEach(row => {
              const day = row.querySelector('.st-day-val').value;
              const time = row.querySelector('.st-time-val').value;
              if (day && time) serviceTimes.push({ day, time });
            });
            let tzVal = document.getElementById("profileTimezone").value;
            if (tzVal === 'local') {
              tzVal = Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Edmonton';
            }
            bodyData = {
              ...existingMeta,
              serviceTimes: serviceTimes,
              timezone: tzVal
            };
          }
        } else if (sub.stepKey === 'logo') {
          url = '/api/onboarding/logo';
          bodyData = {
            logoUrl: document.getElementById("logoUrl").value.trim(),
            darkLogoUrl: document.getElementById("darkLogoUrl").value.trim(),
            faviconUrl: document.getElementById("faviconUrl").value.trim()
          };
        } else if (sub.stepKey === 'website') {
          url = '/api/onboarding/website-basics';
          bodyData = {
            homepageTitle: document.getElementById("homepageTitle").value.trim(),
            homepageSubtitle: document.getElementById("homepageSubtitle").value.trim(),
            aboutText: document.getElementById("aboutText").value.trim(),
            vision: document.getElementById("vision").value.trim(),
            mission: document.getElementById("mission").value.trim()
          };
        } else if (sub.stepKey === 'domain') {
          url = '/api/onboarding/domain';
          bodyData = {
            customDomain: document.getElementById("customDomain").value.trim()
          };
        } else if (sub.stepKey === 'modules') {
          url = '/api/onboarding/modules';
          const chks = document.querySelectorAll(".module-chk");
          // Include platform-level developer/infra modules implicitly behind the scenes
          const keys = [
            'theme-engine',
            'billing-subscription-management',
            'marketplace',
            'developer-marketplace',
            'plugin-extensions-engine'
          ];
          chks.forEach(chk => {
            if (chk.checked) {
              keys.push(chk.value);
            }
          });
          bodyData = { enabledModuleKeys: keys };
        } else if (sub.stepKey === 'giving') {
          url = '/api/onboarding/giving';
          bodyData = {
            gatewayProvider: document.getElementById("gatewayProvider").value,
            integrationMode: document.getElementById("integrationMode").value
          };
        } else if (sub.stepKey === 'invite') {
          const emailInput = document.getElementById("inviteEmail");
          const roleSelect = document.getElementById("inviteRole");
          
          if (emailInput && emailInput.value.trim()) {
            const email = emailInput.value.trim();
            const roleName = roleSelect.value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (emailRegex.test(email)) {
              state.pendingInvites = state.pendingInvites || [];
              if (!state.pendingInvites.some(inv => inv.email.toLowerCase() === email.toLowerCase())) {
                state.pendingInvites.push({ email, roleName });
              }
            }
          }
          
          state.pendingInvites = state.pendingInvites || [];
          
          if (state.pendingInvites.length > 0) {
            await sendAllInvitations();
          }
          advanceWizard();
          return;
        }

        showToast('Saving step...', false);
        rememberOnboardingStep(sub.stepKey, bodyData);
        await apiPatch(url, bodyData);
        showToast('Saved successfully!', false);
        
        await loadOnboarding();
        
        setTimeout(() => {
          advanceWizard();
        }, 400);

      } catch (err) {
        showToast(err.message || 'An error occurred during save', true);
      }
    }

    // Logo Upload & Link Handlers
    let activeCropper = null;

    function toggleAssetMode(id, useLink) {
      const logoUrl = document.getElementById(`${id}Url`);
      const logoUploadContainer = document.getElementById(`${id}UploadContainer`);
      const logoLinkContainer = document.getElementById(`${id}LinkContainer`);
      const logoToggleModeBtn = document.getElementById(`${id}ToggleModeBtn`);
      const logoLabel = document.getElementById(`${id}Label`);
      
      if (!logoUrl || !logoUploadContainer || !logoLinkContainer || !logoToggleModeBtn) return;
      
      if (useLink) {
        // Switch to Link Mode
        logoUploadContainer.style.display = 'none';
        logoLinkContainer.style.display = 'block';
        logoToggleModeBtn.textContent = 'Upload File Instead';
        logoToggleModeBtn.setAttribute('onclick', `toggleAssetMode('${id}', false)`);
        
        // Populate the URL input field with whatever is in the hidden input
        const logoUrlInput = document.getElementById(`${id}UrlInput`);
        if (logoUrlInput) {
          const val = logoUrl.value;
          if (val.startsWith('data:')) {
            logoUrlInput.value = '';
            logoUrl.value = '';
          } else {
            logoUrlInput.value = val;
          }
          handleAssetUrlInput(id, logoUrlInput.value);
        }
      } else {
        // Switch to Upload Mode
        logoUploadContainer.style.display = 'block';
        logoLinkContainer.style.display = 'none';
        logoToggleModeBtn.textContent = 'Link via URL Instead';
        logoToggleModeBtn.setAttribute('onclick', `toggleAssetMode('${id}', true)`);
        
        // If current logoUrl is NOT base64 (i.e. it's a link or empty), clear it
        const val = logoUrl.value;
        if (val.startsWith('http')) {
          logoUrl.value = '';
        }
        
        // Update display states
        const preview = document.getElementById(`${id}UploadZonePreview`);
        const content = document.getElementById(`${id}UploadZoneContent`);
        const previewImg = document.getElementById(`${id}PreviewImg`);
        
        if (logoUrl.value) {
          preview.style.display = 'flex';
          content.style.display = 'none';
          previewImg.src = logoUrl.value;
        } else {
          preview.style.display = 'none';
          content.style.display = 'flex';
          previewImg.src = '';
        }
      }
      lucide.createIcons();
    }

    function handleAssetFileSelect(id, input, isFavicon = false) {
      const file = input.files[0];
      if (!file) return;
      
      // Limit file size (e.g. 2MB, favicon 1MB)
      const maxSize = isFavicon ? 1 * 1024 * 1024 : 2 * 1024 * 1024;
      if (file.size > maxSize) {
        showToast(`File size cannot exceed ${isFavicon ? '1MB' : '2MB'}`, true);
        input.value = '';
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = e.target.result;
        
        if (isFavicon) {
          // Open cropping modal
          openCropperModal(base64);
        } else {
          // Update hidden field
          const logoUrl = document.getElementById(`${id}Url`);
          if (logoUrl) logoUrl.value = base64;
          
          // Update uploader preview
          const preview = document.getElementById(`${id}UploadZonePreview`);
          const content = document.getElementById(`${id}UploadZoneContent`);
          const previewImg = document.getElementById(`${id}PreviewImg`);
          
          if (preview && content && previewImg) {
            preview.style.display = 'flex';
            content.style.display = 'none';
            previewImg.src = base64;
          }
          lucide.createIcons();
          showToast('File selected successfully');
        }
      };
      
      reader.readAsDataURL(file);
    }

    function clearAssetFile(id, event) {
      if (event) {
        event.stopPropagation();
        event.preventDefault();
      }
      
      const logoUrl = document.getElementById(`${id}Url`);
      const input = document.getElementById(`${id}FileInput`);
      const preview = document.getElementById(`${id}UploadZonePreview`);
      const content = document.getElementById(`${id}UploadZoneContent`);
      const previewImg = document.getElementById(`${id}PreviewImg`);
      
      if (logoUrl) logoUrl.value = '';
      if (input) input.value = '';
      
      if (preview && content && previewImg) {
        preview.style.display = 'none';
        content.style.display = 'flex';
        previewImg.src = '';
      }
      lucide.createIcons();
    }

    function handleAssetUrlInput(id, val) {
      const logoUrl = document.getElementById(`${id}Url`);
      if (logoUrl) logoUrl.value = val.trim();
      
      const previewContainer = document.getElementById(`${id}UrlPreviewContainer`);
      const previewImg = document.getElementById(`${id}UrlPreviewImg`);
      
      if (previewContainer && previewImg) {
        if (val.trim()) {
          previewContainer.style.display = 'block';
          previewImg.src = val.trim();
        } else {
          previewContainer.style.display = 'none';
          previewImg.src = '';
        }
      }
    }

    function openCropperModal(imageSrc) {
      const modal = document.getElementById('cropperModal');
      const img = document.getElementById('cropperImage');
      if (!modal || !img) return;
      
      img.src = imageSrc;
      modal.style.display = 'flex';
      
      if (activeCropper) {
        activeCropper.destroy();
      }
      
      activeCropper = new Cropper(img, {
        aspectRatio: 1,
        viewMode: 1,
        dragMode: 'move',
        autoCropArea: 1,
        restore: false,
        guides: true,
        center: true,
        highlight: false,
        cropBoxMovable: true,
        cropBoxResizable: true,
        toggleDragModeOnDblclick: false,
      });
    }

    function closeCropperModal(save) {
      const modal = document.getElementById('cropperModal');
      if (!modal) return;
      
      if (save && activeCropper) {
        const canvas = activeCropper.getCroppedCanvas({
          width: 256,
          height: 256,
        });
        const croppedBase64 = canvas.toDataURL('image/png');
        
        // Update hidden field
        const faviconUrl = document.getElementById('faviconUrl');
        if (faviconUrl) faviconUrl.value = croppedBase64;
        
        // Update preview in UI
        const preview = document.getElementById('faviconUploadZonePreview');
        const content = document.getElementById('faviconUploadZoneContent');
        const previewImg = document.getElementById('faviconPreviewImg');
        
        if (preview && content && previewImg) {
          preview.style.display = 'flex';
          content.style.display = 'none';
          previewImg.src = croppedBase64;
        }
        showToast('Favicon cropped successfully');
      } else {
        // Clear input file
        const input = document.getElementById('faviconFileInput');
        if (input) input.value = '';
      }
      
      if (activeCropper) {
        activeCropper.destroy();
        activeCropper = null;
      }
      modal.style.display = 'none';
      lucide.createIcons();
    }

    function setupLogoUploadDragDrop(id) {
      const zone = document.getElementById(`${id}UploadZone`);
      if (!zone) return;
      
      // Prevent defaults for all drag events
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        zone.addEventListener(eventName, e => {
          e.preventDefault();
          e.stopPropagation();
        }, false);
      });
      
      // Add visual cues
      ['dragenter', 'dragover'].forEach(eventName => {
        zone.addEventListener(eventName, () => {
          zone.style.borderColor = 'var(--accent)';
          zone.style.background = 'var(--accent-soft)';
        }, false);
      });
      
      ['dragleave', 'drop'].forEach(eventName => {
        zone.addEventListener(eventName, () => {
          zone.style.borderColor = 'var(--line)';
          zone.style.background = 'var(--bg-2)';
        }, false);
      });
      
      // Handle drop
      zone.addEventListener('drop', e => {
        const dt = e.dataTransfer;
        const files = dt.files;
        const input = document.getElementById(`${id}FileInput`);
        if (files.length && input) {
          input.files = files;
          const isFavicon = id === 'favicon';
          handleAssetFileSelect(id, input, isFavicon);
        }
      }, false);
    }

    // Pending Invite List Handlers
    function showInviteInputs() {
      state.showInviteInputs = true;
      renderActiveStep();
    }

    function addPendingInvite() {
      const emailInput = document.getElementById("inviteEmail");
      const roleSelect = document.getElementById("inviteRole");
      if (!emailInput || !roleSelect) return;
      
      const email = emailInput.value.trim();
      const roleName = roleSelect.value;
      
      if (!email) {
        showToast('Please enter an email address', true);
        return;
      }
      
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showToast('Please enter a valid email address', true);
        return;
      }
      
      state.pendingInvites = state.pendingInvites || [];
      
      if (state.pendingInvites.some(inv => inv.email.toLowerCase() === email.toLowerCase())) {
        showToast('This email is already in the invitation list', true);
        return;
      }
      
      state.pendingInvites.push({ email, roleName });
      
      // Clear inputs and hide the row, showing the bottom add button
      emailInput.value = '';
      state.showInviteInputs = false;
      
      renderActiveStep();
      showToast('Staff member added to list');
    }

    function removePendingInvite(idx) {
      if (state.pendingInvites && state.pendingInvites[idx]) {
        state.pendingInvites.splice(idx, 1);
        // If the pending invites list becomes empty, reset showInviteInputs so it defaults back to showing the inputs
        if (state.pendingInvites.length === 0) {
          state.showInviteInputs = false;
        }
        renderActiveStep();
        showToast('Staff member removed');
      }
    }

    // Handles sending all pending invites in parallel
    async function sendAllInvitations() {
      state.pendingInvites = state.pendingInvites || [];
      if (state.pendingInvites.length === 0) return;
      
      showToast(`Sending ${state.pendingInvites.length} invitation(s)...`, false);
      
      const promises = state.pendingInvites.map(inv => {
        return apiPost('/api/onboarding/invite-team', { email: inv.email, roleName: inv.roleName });
      });
      
      try {
        await Promise.all(promises);
        showToast('All invitations sent successfully!', false);
        
        // Remember invite metadata for Tab 4 review page
        const lastInv = state.pendingInvites[state.pendingInvites.length - 1];
        rememberOnboardingStep('invite', {
          invitedEmail: lastInv.email,
          invitedRole: lastInv.roleName,
          totalInvitedCount: state.pendingInvites.length
        });
        
        state.pendingInvites = [];
        await loadOnboarding();
      } catch (err) {
        console.error(err);
        showToast('Some invitations failed to send: ' + err.message, true);
        throw err;
      }
    }

    // Launch completed onboarding
    async function completeOnboarding() {
      try {
        showToast('Completing onboarding...', false);
        await apiPost('/api/onboarding/complete');
        mergeOnboardingContext({ completedAt: new Date().toISOString() });
        showToast('Launch success! Entering dashboard...', false);
        
        // Mark that we are entering the dashboard for the very first time
        if (tenantId) {
          localStorage.setItem('churchos.first_dashboard_load.' + tenantId, 'true');
        }
        
        setTimeout(() => {
          window.location.href = "/admin";
        }, 1200);
      } catch (err) {
        showToast(err.message || 'Launch failed', true);
      }
    }

    // Close dropdowns on scroll to prevent floating fixed menus from becoming misaligned
    document.addEventListener('scroll', function(e) {
      if (e.target.closest('#stepForm') || e.target.id === 'stepForm' || e.target === document) {
        document.querySelectorAll('.modern-select-wrapper.open').forEach(wrapper => {
          closeDropdown(wrapper);
        });
      }
    }, true);

    // Initialize Page
    loadOnboarding();
  </script>
</body>
